<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>오월의 부귀화가 핀다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--ink:#1a1a1a;--cream:#f5f0e8;--gold:#b8915a;--peony-pink:#d4899b}
  html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Serif KR',serif;background:var(--cream);color:var(--ink);-webkit-tap-highlight-color:transparent;touch-action:manipulation}

  /* ─── LANDING ─── */
  #landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:var(--cream);transition:opacity .8s ease,transform .8s ease}
  #landing.hide{opacity:0;transform:scale(1.05);pointer-events:none}
  #landing::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,rgba(184,145,90,.08) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(212,137,155,.08) 0%,transparent 50%);pointer-events:none}
  .top-deco{width:1px;height:60px;background:var(--gold);margin-bottom:24px;animation:growDown 1.2s ease forwards;transform-origin:top}
  @keyframes growDown{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .subtitle-top{font-size:11px;letter-spacing:6px;color:var(--gold);margin-bottom:20px;opacity:0;animation:fadeUp 1s .4s ease forwards}
  .main-title{font-weight:900;font-size:clamp(28px,7vw,42px);line-height:1.5;text-align:center;margin-bottom:36px;opacity:0;animation:fadeUp 1s .6s ease forwards}
  .main-title .accent{color:var(--peony-pink)}
  .artist-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:40px;opacity:0;animation:fadeUp 1s .8s ease forwards}
  .artist-photo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);box-shadow:0 8px 30px rgba(0,0,0,.1)}
  .artist-name{margin-top:14px;font-size:15px;font-weight:500;letter-spacing:3px}
  .cta-btn{display:flex;align-items:center;gap:10px;padding:16px 36px;background:var(--ink);color:var(--cream);border:none;border-radius:50px;font-family:'Noto Serif KR',serif;font-size:15px;font-weight:500;letter-spacing:2px;cursor:pointer;opacity:0;animation:fadeUp 1s 1s ease forwards;transition:transform .3s ease}
  .cta-btn:active{transform:scale(.96)}
  .cta-btn svg{width:18px;height:18px}
  .bottom-deco{position:absolute;bottom:40px;font-size:10px;letter-spacing:4px;color:rgba(0,0,0,.25);opacity:0;animation:fadeUp 1s 1.2s ease forwards}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* ─── MODAL ─── */
  #permModal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center}
  #permModal.show{display:flex}
  .modal-card{background:var(--cream);border-radius:20px;padding:36px 28px;width:min(88vw,340px);text-align:center;animation:modalIn .4s ease}
  @keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal-icon{width:56px;height:56px;margin:0 auto 16px;background:linear-gradient(135deg,var(--peony-pink),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center}
  .modal-icon svg{width:28px;height:28px;fill:white}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:10px}
  .modal-desc{font-size:13px;line-height:1.7;color:rgba(0,0,0,.55);margin-bottom:24px}
  .modal-btns{display:flex;gap:10px}
  .modal-btns button{flex:1;padding:14px;border:none;border-radius:12px;font-family:'Noto Serif KR',serif;font-size:14px;font-weight:500;cursor:pointer;transition:transform .2s ease}
  .modal-btns button:active{transform:scale(.96)}
  .btn-cancel{background:rgba(0,0,0,.06);color:var(--ink)}
  .btn-confirm{background:var(--ink);color:var(--cream)}

  /* ─── AR VIEW ─── */
  #arView{position:fixed;inset:0;display:none;z-index:50;background:#000}
  #arView.active{display:block}
  #cameraFeed{width:100%;height:100%;object-fit:cover}
  #threeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:51;pointer-events:auto}

  /* Reticle hint */
  #reticle{position:fixed;left:50%;top:55%;transform:translate(-50%,-50%);z-index:55;pointer-events:none;opacity:0;transition:opacity .5s ease}
  #reticle.show{opacity:1}
  .reticle-ring{width:70px;height:70px;border:2px solid rgba(255,255,255,.7);border-radius:50%;animation:reticlePulse 2s ease infinite}
  .reticle-dot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:white;border-radius:50%}
  @keyframes reticlePulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}

  #touchHint{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:white;padding:12px 24px;border-radius:30px;font-size:13px;letter-spacing:1px;pointer-events:none;transition:opacity .6s ease}
  #touchHint.hidden{opacity:0}

  #closeAR{position:fixed;top:env(safe-area-inset-top,16px);left:16px;margin-top:16px;z-index:60;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:none;color:white;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  #flowerCount{position:fixed;top:env(safe-area-inset-top,16px);right:16px;margin-top:16px;z-index:60;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:white;padding:8px 16px;border-radius:20px;font-size:12px;letter-spacing:1px}

  #loadingOverlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);flex-direction:column;align-items:center;justify-content:center;color:white}
  #loadingOverlay.show{display:flex}
  .loader{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  #errorScreen{display:none;position:fixed;inset:0;z-index:300;background:var(--cream);flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
  #errorScreen.show{display:flex}
  #errorScreen h2{font-size:20px;margin-bottom:12px}
  #errorScreen p{font-size:14px;color:rgba(0,0,0,.5);line-height:1.6}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="top-deco"></div>
  <div class="subtitle-top">AR EXPERIENCE</div>
  <h1 class="main-title">오월의<br><span class="accent">부귀화</span>가 핀다</h1>
  <div class="artist-wrap">
    <img class="artist-photo" id="artistImg" alt="김시아 작가">
    <div class="artist-name">김시아 작가</div>
  </div>
  <button class="cta-btn" id="startBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    AR 체험하기
  </button>
  <div class="bottom-deco">TOUCH TO BLOOM</div>
</div>

<!-- PERMISSION MODAL -->
<div id="permModal">
  <div class="modal-card">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div class="modal-title">카메라 사용 허가</div>
    <div class="modal-desc">
      AR 체험을 위해 카메라 접근 권한이 필요합니다.<br>
      바닥을 비추면 꽃이 피어납니다.
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelPerm">취소</button>
      <button class="btn-confirm" id="confirmPerm">허용하기</button>
    </div>
  </div>
</div>

<!-- AR VIEW -->
<div id="arView">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="threeCanvas"></canvas>
  <div id="reticle"><div class="reticle-ring"></div><div class="reticle-dot"></div></div>
  <button id="closeAR">✕</button>
  <div id="flowerCount">🌸 0</div>
  <div id="touchHint">바닥을 비추고 터치하세요</div>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loader"></div>
  <div style="font-size:14px;letter-spacing:1px">카메라 준비 중...</div>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <h2>카메라를 열 수 없습니다</h2>
  <p>브라우저 설정에서 카메라 권한을 허용해 주세요.</p>
</div>

// ─── THREE.JS SETUP ───
function initThree() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.2, 0); // eye height ~1.2m
  camera.lookAt(0, groundY, -2);

  renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Lighting - warm and natural
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.0);
  sunLight.position.set(3, 6, 4);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = 1024;
  sunLight.shadow.mapSize.height = 1024;
  sunLight.shadow.camera.near = 0.5;
  sunLight.shadow.camera.far = 20;
  sunLight.shadow.camera.left = -5;
  sunLight.shadow.camera.right = 5;
  sunLight.shadow.camera.top = 5;
  sunLight.shadow.camera.bottom = -5;
  scene.add(sunLight);

  const fillLight = new THREE.DirectionalLight(0xd4e8ff, 0.3);
  fillLight.position.set(-2, 2, -3);
  scene.add(fillLight);

  // Invisible ground plane for shadow catching
  const shadowGeo = new THREE.PlaneGeometry(30, 30);
  const shadowMat = new THREE.ShadowMaterial({ opacity: 0.15 });
  const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = groundY;
  shadowPlane.receiveShadow = true;
  scene.add(shadowPlane);

  // Load texture
  const img = new Image();
  img.onload = () => {
    peonyTexture = new THREE.Texture(img);
    peonyTexture.needsUpdate = true;
    peonyTexture.encoding = THREE.sRGBEncoding;
    // Show reticle once texture is ready
    reticle.classList.add('show');
  };
  img.src = PEONY_SRC;

  // Gyroscope for camera tilt
  setupGyro();
}

// ─── GYROSCOPE ───
function setupGyro() {
  function handleOrientation(e) {
    if (e.beta !== null) {
      gyroEnabled = true;
      deviceBeta = e.beta; // 0=flat, 90=upright
    }
  }

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation); })
      .catch(() => {});
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
  }
}

// ─── SCREEN TO FLOOR ───
function screenToFloor(screenX, screenY) {
  const mouse = new THREE.Vector2(
    (screenX / window.innerWidth) * 2 - 1,
    -(screenY / window.innerHeight) * 2 + 1
  );

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(mouse, camera);

  // Intersect with horizontal ground plane at groundY
  const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -groundY);
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane, intersection);

  return intersection;
}

// ─── SPAWN PEONY ON FLOOR ───
function spawnPeony(screenX, screenY) {
  if (!peonyTexture) return;

  const pos = screenToFloor(screenX, screenY);
  if (!pos) return;

  // Create a vertical billboard-style plane with the peony image
  // but tilted slightly to look like it's growing FROM the floor
  const group = new THREE.Group();
  group.position.copy(pos);

  const aspectRatio = 1.0; // square image
  const baseHeight = 1.0 + Math.random() * 0.4;
  const baseWidth = baseHeight * aspectRatio;

  // Main peony plane - stands upright from floor
  const planeGeo = new THREE.PlaneGeometry(baseWidth, baseHeight, 1, 1);
  const planeMat = new THREE.MeshStandardMaterial({
    map: peonyTexture.clone(),
    transparent: true,
    alphaTest: 0.1,
    side: THREE.DoubleSide,
    roughness: 0.6,
    metalness: 0.0
  });
  planeMat.map.needsUpdate = true;

  const planeMesh = new THREE.Mesh(planeGeo, planeMat);
  planeMesh.position.y = baseHeight / 2; // bottom sits on ground
  planeMesh.castShadow = true;
  planeMesh.receiveShadow = true;

  // Face toward camera roughly
  const lookAngle = Math.atan2(
    camera.position.x - pos.x,
    camera.position.z - pos.z
  );
  planeMesh.rotation.y = lookAngle + (Math.random() - 0.5) * 0.3;

  group.add(planeMesh);

  // Add a subtle ground shadow circle
  const shadowCircleGeo = new THREE.CircleGeometry(baseWidth * 0.4, 16);
  const shadowCircleMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.08
  });
  const shadowCircle = new THREE.Mesh(shadowCircleGeo, shadowCircleMat);
  shadowCircle.rotation.x = -Math.PI / 2;
  shadowCircle.position.y = 0.005;
  group.add(shadowCircle);

  // Bloom animation data
  group.userData = {
    born: performance.now(),
    bloomDuration: 1200 + Math.random() * 400,
    targetScaleY: 1,
    targetScaleX: 1,
    floatPhase: Math.random() * Math.PI * 2,
    swaySpeed: 0.3 + Math.random() * 0.3,
    swayAmount: 0.02 + Math.random() * 0.02,
    baseRotY: planeMesh.rotation.y
  };

  // Start from ground (scale Y = 0)
  group.scale.set(1, 0.01, 1);

  scene.add(group);
  flowerObjects.push(group);

  flowerCount++;
  flowerCountEl.textContent = '🌸 ' + flowerCount;

  // Particles
  spawnParticles(pos);
}

// ─── PARTICLES ───
function spawnParticles(position) {
  const count = 30;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const velocities = [];

  const pColors = [
    new THREE.Color(0xd4899b), new THREE.Color(0xb8915a),
    new THREE.Color(0xf5e6d0), new THREE.Color(0xe8b4c0),
    new THREE.Color(0x8faa7a), new THREE.Color(0xffffff)
  ];

  for (let i = 0; i < count; i++) {
    positions[i*3] = position.x;
    positions[i*3+1] = position.y + 0.3;
    positions[i*3+2] = position.z;

    const angle = Math.random() * Math.PI * 2;
    const speed = 0.005 + Math.random() * 0.02;
    velocities.push({
      x: Math.cos(angle) * speed,
      y: 0.008 + Math.random() * 0.015,
      z: Math.sin(angle) * speed
    });

    const c = pColors[Math.floor(Math.random() * pColors.length)];
    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.04, vertexColors: true,
    transparent: true, opacity: 1, depthWrite: false
  });

  const points = new THREE.Points(geo, mat);
  points.userData = { velocities, born: performance.now(), lifespan: 2000 };
  scene.add(points);
  particleSystems.push(points);
}

// ─── ANIMATION LOOP ───
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();

  // Update camera tilt based on gyro
  if (gyroEnabled) {
    const tiltRad = THREE.MathUtils.degToRad(deviceBeta);
    const lookDist = 3;
    const lookY = groundY;
    const lookZ = -Math.cos(tiltRad) * lookDist;
    camera.lookAt(0, lookY, lookZ);
  }

  // Update flowers
  for (const flower of flowerObjects) {
    const age = now - flower.userData.born;
    const bloomT = Math.min(1, age / flower.userData.bloomDuration);

    // Grow from ground upward - elastic ease out
    let eased;
    if (bloomT < 1) {
      eased = 1 - Math.pow(2, -10 * bloomT) * Math.cos((bloomT * 10 - 0.75) * (2 * Math.PI / 3));
      eased = Math.max(0, eased);
    } else {
      eased = 1;
    }

    flower.scale.y = eased * flower.userData.targetScaleY;
    flower.scale.x = (0.3 + 0.7 * eased) * flower.userData.targetScaleX;
    flower.scale.z = flower.scale.x;

    // Gentle sway in wind
    if (bloomT >= 1 && flower.children[0]) {
      const sway = Math.sin(now / 1000 * flower.userData.swaySpeed + flower.userData.floatPhase);
      flower.children[0].rotation.y = flower.userData.baseRotY + sway * flower.userData.swayAmount;
      flower.children[0].rotation.z = sway * flower.userData.swayAmount * 0.5;
    }
  }

  // Update particles
  for (let i = particleSystems.length - 1; i >= 0; i--) {
    const ps = particleSystems[i];
    const age = now - ps.userData.born;
    const life = 1 - age / ps.userData.lifespan;

    if (life <= 0) {
      scene.remove(ps);
      ps.geometry.dispose();
      ps.material.dispose();
      particleSystems.splice(i, 1);
      continue;
    }

    ps.material.opacity = life;
    const pos = ps.geometry.attributes.position;
    for (let j = 0; j < pos.count; j++) {
      const v = ps.userData.velocities[j];
      pos.setX(j, pos.getX(j) + v.x);
      pos.setY(j, pos.getY(j) + v.y);
      pos.setZ(j, pos.getZ(j) + v.z);
      v.y -= 0.0002;
    }
    pos.needsUpdate = true;
  }

  renderer.render(scene, camera);
}

// ─── MUSIC ───
function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

    function playNote() {
      if (!audioCtx || audioCtx.state === 'closed') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
      filter.type = 'lowpass';
      filter.frequency.value = 800 + Math.random() * 400;
      const vol = 0.04 + Math.random() * 0.03;
      const dur = 1.5 + Math.random() * 2;
      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + dur);
      setTimeout(playNote, 800 + Math.random() * 1500);
    }

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const padGain = audioCtx.createGain();
    const padFilter = audioCtx.createBiquadFilter();
    osc1.type = 'sine'; osc1.frequency.value = 130.81;
    osc2.type = 'sine'; osc2.frequency.value = 196.00;
    padFilter.type = 'lowpass'; padFilter.frequency.value = 400;
    padGain.gain.value = 0.025;
    osc1.connect(padFilter); osc2.connect(padFilter);
    padFilter.connect(padGain); padGain.connect(audioCtx.destination);
    osc1.start(); osc2.start();
    playNote();
  } catch(e) {}
}

// ─── CAMERA START ───
async function startCamera() {
  loadingOverlay.classList.add('show');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    cameraFeed.srcObject = stream;
    await cameraFeed.play();

    loadingOverlay.classList.remove('show');
    landing.classList.add('hide');
    arView.classList.add('active');

    initThree();
    animate();
    startMusic();

    // Touch events
    threeCanvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (let t of e.changedTouches) {
        spawnPeony(t.clientX, t.clientY);
      }
      if (flowerCount <= e.changedTouches.length) {
        touchHint.classList.add('hidden');
        reticle.classList.remove('show');
      }
    }, { passive: false });

    threeCanvas.addEventListener('click', (e) => {
      spawnPeony(e.clientX, e.clientY);
      if (flowerCount === 1) {
        touchHint.classList.add('hidden');
        reticle.classList.remove('show');
      }
    });

  } catch(err) {
    console.error(err);
    loadingOverlay.classList.remove('show');
    permModal.classList.remove('show');
    errorScreen.classList.add('show');
  }
}

// ─── CLOSE AR ───
function closeARView() {
  if (cameraFeed.srcObject) cameraFeed.srcObject.getTracks().forEach(t => t.stop());
  if (audioCtx) { audioCtx.close(); musicStarted = false; }

  flowerObjects.forEach(f => {
    f.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); } });
    scene.remove(f);
  });
  particleSystems.forEach(ps => { ps.geometry.dispose(); ps.material.dispose(); scene.remove(ps); });
  flowerObjects = []; particleSystems = [];
  flowerCount = 0; flowerCountEl.textContent = '🌸 0';

  if (renderer) { renderer.dispose(); renderer = null; }
  scene = null; camera = null;

  arView.classList.remove('active');
  landing.classList.remove('hide');
  touchHint.classList.remove('hidden');
  reticle.classList.remove('show');
}

// ─── EVENTS ───
document.getElementById('startBtn').addEventListener('click', () => permModal.classList.add('show'));
document.getElementById('cancelPerm').addEventListener('click', () => permModal.classList.remove('show'));
document.getElementById('confirmPerm').addEventListener('click', () => { permModal.classList.remove('show'); startCamera(); });
document.getElementById('closeAR').addEventListener('click', closeARView);

window.addEventListener('resize', () => {
  if (camera && renderer) {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
});
</script>
