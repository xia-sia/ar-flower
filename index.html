<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>오월의 부귀화가 핀다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1a1a;
    --cream: #f5f0e8;
    --gold: #b8915a;
    --peony-pink: #d4899b;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ─── LANDING PAGE ─── */
  #landing {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: var(--cream);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #landing.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
  #landing::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(184,145,90,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(212,137,155,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .top-deco {
    width: 1px; height: 60px;
    background: var(--gold);
    margin-bottom: 24px;
    animation: growDown 1.2s ease forwards;
    transform-origin: top;
  }
  @keyframes growDown { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  .subtitle-top {
    font-size: 11px; letter-spacing: 6px; color: var(--gold);
    margin-bottom: 20px;
    opacity: 0; animation: fadeUp 1s 0.4s ease forwards;
  }
  .main-title {
    font-weight: 900; font-size: clamp(28px, 7vw, 42px);
    line-height: 1.5; text-align: center;
    margin-bottom: 36px;
    opacity: 0; animation: fadeUp 1s 0.6s ease forwards;
  }
  .main-title .accent { color: var(--peony-pink); }

  .artist-wrap {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 40px;
    opacity: 0; animation: fadeUp 1s 0.8s ease forwards;
  }
  .artist-photo {
    width: 110px; height: 110px; border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gold);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }
  .artist-name {
    margin-top: 14px; font-size: 15px; font-weight: 500; letter-spacing: 3px;
  }

  .cta-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 36px;
    background: var(--ink); color: var(--cream);
    border: none; border-radius: 50px;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px; font-weight: 500; letter-spacing: 2px;
    cursor: pointer;
    opacity: 0; animation: fadeUp 1s 1s ease forwards;
    transition: transform 0.3s ease;
  }
  .cta-btn:active { transform: scale(0.96); }
  .cta-btn svg { width: 18px; height: 18px; }

  .bottom-deco {
    position: absolute; bottom: 40px;
    font-size: 10px; letter-spacing: 4px; color: rgba(0,0,0,0.25);
    opacity: 0; animation: fadeUp 1s 1.2s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── MODAL ─── */
  #permModal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  #permModal.show { display: flex; }

  .modal-card {
    background: var(--cream); border-radius: 20px;
    padding: 36px 28px; width: min(88vw, 340px); text-align: center;
    animation: modalIn 0.4s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-icon {
    width: 56px; height: 56px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--peony-pink), var(--gold));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-icon svg { width: 28px; height: 28px; fill: white; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .modal-desc { font-size: 13px; line-height: 1.7; color: rgba(0,0,0,0.55); margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: transform 0.2s ease;
  }
  .modal-btns button:active { transform: scale(0.96); }
  .btn-cancel { background: rgba(0,0,0,0.06); color: var(--ink); }
  .btn-confirm { background: var(--ink); color: var(--cream); }

  /* ─── AR VIEW ─── */
  #arView { position: fixed; inset: 0; display: none; z-index: 50; background: #000; }
  #arView.active { display: block; }

  #cameraFeed { width: 100%; height: 100%; object-fit: cover; }

  #threeCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 51;
    pointer-events: auto;
  }

  #touchHint {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    z-index: 60;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: white; padding: 12px 24px; border-radius: 30px;
    font-size: 13px; letter-spacing: 1px; pointer-events: none;
    animation: hintPulse 2.5s ease infinite;
    transition: opacity 0.6s ease;
  }
  #touchHint.hidden { opacity: 0; }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.03); }
  }

  #closeAR {
    position: fixed; top: env(safe-area-inset-top, 16px); left: 16px;
    margin-top: 16px; z-index: 60;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: none; color: white; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  #flowerCount {
    position: fixed; top: env(safe-area-inset-top, 16px); right: 16px;
    margin-top: 16px; z-index: 60;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: white; padding: 8px 16px; border-radius: 20px;
    font-size: 12px; letter-spacing: 1px;
  }

  #loadingOverlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    flex-direction: column; align-items: center; justify-content: center; color: white;
  }
  #loadingOverlay.show { display: flex; }
  .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #errorScreen {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: var(--cream);
    flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; text-align: center;
  }
  #errorScreen.show { display: flex; }
  #errorScreen h2 { font-size: 20px; margin-bottom: 12px; }
  #errorScreen p { font-size: 14px; color: rgba(0,0,0,0.5); line-height: 1.6; }
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="top-deco"></div>
  <div class="subtitle-top">AR EXPERIENCE</div>
  <h1 class="main-title">오월의<br><span class="accent">부귀화</span>가 핀다</h1>
  <div class="artist-wrap">
    <img class="artist-photo" id="artistImg" alt="김시아 작가">
    <div class="artist-name">김시아 작가</div>
  </div>
  <button class="cta-btn" id="startBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    AR 체험하기
  </button>
  <div class="bottom-deco">TOUCH TO BLOOM</div>
</div>

<!-- PERMISSION MODAL -->
<div id="permModal">
  <div class="modal-card">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div class="modal-title">카메라 사용 허가</div>
    <div class="modal-desc">
      AR 체험을 위해 카메라 접근 권한이 필요합니다.<br>
      촬영된 영상은 저장되지 않습니다.
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelPerm">취소</button>
      <button class="btn-confirm" id="confirmPerm">허용하기</button>
    </div>
  </div>
</div>

<!-- AR VIEW -->
<div id="arView">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="threeCanvas"></canvas>
  <button id="closeAR">✕</button>
  <div id="flowerCount">🌸 0</div>
  <div id="touchHint">화면을 터치하면 꽃이 피어납니다</div>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loader"></div>
  <div style="font-size:14px;letter-spacing:1px;">카메라 준비 중...</div>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <h2>카메라를 열 수 없습니다</h2>
  <p>브라우저 설정에서 카메라 권한을 허용해 주세요.</p>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

// ─── THREE.JS SETUP ───
function initThree() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xfff5e0, 0.9);
  dirLight.position.set(2, 4, 3);
  scene.add(dirLight);

  const backLight = new THREE.DirectionalLight(0xd4e8ff, 0.3);
  backLight.position.set(-2, -1, -2);
  scene.add(backLight);
}

// ─── CREATE A SINGLE PETAL GEOMETRY ───
function createPetalGeometry(width, height, curl) {
  const shape = new THREE.Shape();
  const w = width / 2;

  shape.moveTo(0, 0);
  shape.bezierCurveTo(w * 0.6, height * 0.1, w, height * 0.4, w * 0.85, height * 0.7);
  shape.bezierCurveTo(w * 0.7, height * 0.88, w * 0.3, height, 0, height * 1.02);
  shape.bezierCurveTo(-w * 0.3, height, -w * 0.7, height * 0.88, -w * 0.85, height * 0.7);
  shape.bezierCurveTo(-w, height * 0.4, -w * 0.6, height * 0.1, 0, 0);

  const geometry = new THREE.ShapeGeometry(shape, 12);

  // Bend the petal for 3D curvature
  const pos = geometry.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    const normalizedY = y / height;
    // Curl outward
    pos.setZ(i, Math.sin(normalizedY * Math.PI * curl) * height * 0.25);
    // Slight twist
    const twist = normalizedY * 0.15;
    const x = pos.getX(i);
    pos.setX(i, x * Math.cos(twist) - pos.getZ(i) * Math.sin(twist) * 0.1);
  }
  geometry.computeVertexNormals();
  return geometry;
}

// ─── CREATE A LEAF GEOMETRY ───
function createLeafGeometry() {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.bezierCurveTo(0.15, 0.1, 0.2, 0.3, 0.15, 0.5);
  shape.bezierCurveTo(0.1, 0.65, 0.05, 0.75, 0, 0.8);
  shape.bezierCurveTo(-0.05, 0.75, -0.1, 0.65, -0.15, 0.5);
  shape.bezierCurveTo(-0.2, 0.3, -0.15, 0.1, 0, 0);

  const geo = new THREE.ShapeGeometry(shape, 8);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    pos.setZ(i, Math.sin(y / 0.8 * Math.PI) * 0.06);
  }
  geo.computeVertexNormals();
  return geo;
}

// ─── BUILD 3D PEONY FLOWER ───
function createPeony3D(type) {
  const group = new THREE.Group();
  const palette = PEONY_TYPES[type];

  // Center sphere
  const centerGeo = new THREE.SphereGeometry(0.08, 12, 12);
  const centerMat = new THREE.MeshStandardMaterial({
    color: palette.center,
    roughness: 0.6
  });
  const center = new THREE.Mesh(centerGeo, centerMat);
  center.position.y = 0.15;
  group.add(center);

  // Inner small petals (tight cluster)
  const innerCount = 8;
  for (let i = 0; i < innerCount; i++) {
    const angle = (i / innerCount) * Math.PI * 2 + Math.random() * 0.3;
    const petalGeo = createPetalGeometry(0.12, 0.2, 0.8 + Math.random() * 0.4);
    const color = palette.petals[Math.floor(Math.random() * palette.petals.length)];
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      side: THREE.DoubleSide,
      roughness: 0.5,
      metalness: 0.05
    });
    const petal = new THREE.Mesh(petalGeo, mat);
    petal.rotation.x = -0.3 - Math.random() * 0.3;
    petal.rotation.y = angle;
    petal.position.y = 0.05;
    petal.userData.targetRotX = petal.rotation.x;
    petal.userData.ring = 0;
    group.add(petal);
  }

  // Middle petals
  const midCount = 12;
  for (let i = 0; i < midCount; i++) {
    const angle = (i / midCount) * Math.PI * 2 + Math.random() * 0.2;
    const petalGeo = createPetalGeometry(0.18, 0.28, 0.6 + Math.random() * 0.3);
    const color = palette.petals[Math.floor(Math.random() * palette.petals.length)];
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      side: THREE.DoubleSide,
      roughness: 0.45,
      metalness: 0.05
    });
    const petal = new THREE.Mesh(petalGeo, mat);
    petal.rotation.x = -0.6 - Math.random() * 0.3;
    petal.rotation.y = angle;
    petal.position.y = -0.02;
    petal.userData.targetRotX = petal.rotation.x;
    petal.userData.ring = 1;
    group.add(petal);
  }

  // Outer large petals
  const outerCount = 14;
  for (let i = 0; i < outerCount; i++) {
    const angle = (i / outerCount) * Math.PI * 2 + Math.random() * 0.15;
    const petalGeo = createPetalGeometry(0.22, 0.35, 0.4 + Math.random() * 0.3);
    const color = palette.petals[Math.floor(Math.random() * palette.petals.length)];
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      side: THREE.DoubleSide,
      roughness: 0.4,
      metalness: 0.05
    });
    const petal = new THREE.Mesh(petalGeo, mat);
    petal.rotation.x = -1.0 - Math.random() * 0.3;
    petal.rotation.y = angle;
    petal.position.y = -0.06;
    petal.userData.targetRotX = petal.rotation.x;
    petal.userData.ring = 2;
    group.add(petal);
  }

  // Leaves (2~3)
  const leafCount = 2 + Math.floor(Math.random() * 2);
  const leafGeo = createLeafGeometry();
  for (let i = 0; i < leafCount; i++) {
    const angle = (i / leafCount) * Math.PI * 2 + Math.random() * 0.5;
    const leafColors = [0x5a7247, 0x6b8354, 0x4d6340, 0x7a9466];
    const mat = new THREE.MeshStandardMaterial({
      color: leafColors[Math.floor(Math.random() * leafColors.length)],
      side: THREE.DoubleSide,
      roughness: 0.55,
      metalness: 0.02
    });
    const leaf = new THREE.Mesh(leafGeo, mat);
    leaf.scale.set(1.2, 1.2, 1.2);
    leaf.rotation.x = -1.3;
    leaf.rotation.y = angle;
    leaf.position.y = -0.1;
    leaf.userData.ring = 3;
    group.add(leaf);
  }

  return group;
}

// ─── SCREEN TO WORLD POSITION ───
function screenToWorld(screenX, screenY, z) {
  const vec = new THREE.Vector3(
    (screenX / window.innerWidth) * 2 - 1,
    -(screenY / window.innerHeight) * 2 + 1,
    0.5
  );
  vec.unproject(camera);
  const dir = vec.sub(camera.position).normalize();
  const dist = (z - camera.position.z) / dir.z;
  return camera.position.clone().add(dir.multiplyScalar(dist));
}

// ─── SPAWN FLOWER ───
function spawnFlower(screenX, screenY) {
  const type = Math.floor(Math.random() * 3);
  const flower = createPeony3D(type);

  const worldPos = screenToWorld(screenX, screenY, -2 - Math.random() * 2);
  flower.position.copy(worldPos);

  // Start tiny, will bloom
  flower.scale.set(0.01, 0.01, 0.01);

  // Random initial tilt
  flower.rotation.x = (Math.random() - 0.5) * 0.4;
  flower.rotation.z = (Math.random() - 0.5) * 0.3;

  // Animation data
  flower.userData.born = performance.now();
  flower.userData.bloomDuration = 1500 + Math.random() * 500;
  flower.userData.targetScale = 0.8 + Math.random() * 0.6;
  flower.userData.floatPhase = Math.random() * Math.PI * 2;
  flower.userData.rotateSpeed = (Math.random() - 0.5) * 0.3;

  scene.add(flower);
  flowerGroups.push(flower);

  flowerCount++;
  flowerCountEl.textContent = '🌸 ' + flowerCount;

  // Create particle burst
  spawnParticles(worldPos);
}

// ─── PARTICLES ───
let particleSystems = [];

function spawnParticles(position) {
  const count = 25;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = [];
  const colors = new Float32Array(count * 3);

  const particleColors = [
    new THREE.Color(0xd4899b),
    new THREE.Color(0xb8915a),
    new THREE.Color(0xf5e6d0),
    new THREE.Color(0xe8b4c0),
    new THREE.Color(0xffffff)
  ];

  for (let i = 0; i < count; i++) {
    positions[i * 3] = position.x;
    positions[i * 3 + 1] = position.y;
    positions[i * 3 + 2] = position.z;

    const angle = Math.random() * Math.PI * 2;
    const speed = 0.01 + Math.random() * 0.03;
    const upSpeed = 0.005 + Math.random() * 0.02;
    velocities.push({
      x: Math.cos(angle) * speed,
      y: upSpeed,
      z: Math.sin(angle) * speed * 0.5
    });

    const c = particleColors[Math.floor(Math.random() * particleColors.length)];
    colors[i * 3] = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.04,
    vertexColors: true,
    transparent: true,
    opacity: 1,
    depthWrite: false
  });

  const points = new THREE.Points(geo, mat);
  points.userData.velocities = velocities;
  points.userData.born = performance.now();
  points.userData.lifespan = 1500;

  scene.add(points);
  particleSystems.push(points);
}

// ─── ANIMATION LOOP ───
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();

  // Update flowers
  for (let i = flowerGroups.length - 1; i >= 0; i--) {
    const flower = flowerGroups[i];
    const age = now - flower.userData.born;
    const bloomT = Math.min(1, age / flower.userData.bloomDuration);

    // Ease out elastic for bloom
    const eased = bloomT < 1
      ? 1 - Math.pow(2, -10 * bloomT) * Math.cos((bloomT * 10 - 0.75) * ((2 * Math.PI) / 3))
      : 1;

    const s = flower.userData.targetScale * Math.max(0, eased);
    flower.scale.set(s, s, s);

    // Petal bloom animation - petals unfurl outward
    flower.children.forEach(child => {
      if (child.userData.ring !== undefined && child.userData.ring < 3) {
        const ringDelay = child.userData.ring * 0.15;
        const petalT = Math.max(0, Math.min(1, (bloomT - ringDelay) / (1 - ringDelay)));
        if (child.userData.targetRotX !== undefined) {
          // Start upright, settle to target
          const startRot = -0.1;
          child.rotation.x = startRot + (child.userData.targetRotX - startRot) * petalT;
        }
      }
    });

    // Gentle floating
    const floatT = now / 2000 + flower.userData.floatPhase;
    flower.position.y += Math.sin(floatT) * 0.0003;

    // Slow rotation
    flower.rotation.y += flower.userData.rotateSpeed * 0.01;
  }

  // Update particles
  for (let i = particleSystems.length - 1; i >= 0; i--) {
    const ps = particleSystems[i];
    const age = now - ps.userData.born;
    const life = 1 - age / ps.userData.lifespan;

    if (life <= 0) {
      scene.remove(ps);
      ps.geometry.dispose();
      ps.material.dispose();
      particleSystems.splice(i, 1);
      continue;
    }

    ps.material.opacity = life;
    const pos = ps.geometry.attributes.position;
    for (let j = 0; j < pos.count; j++) {
      const v = ps.userData.velocities[j];
      pos.setX(j, pos.getX(j) + v.x);
      pos.setY(j, pos.getY(j) + v.y);
      pos.setZ(j, pos.getZ(j) + v.z);
      v.y -= 0.0003; // gravity
    }
    pos.needsUpdate = true;
  }

  renderer.render(scene, camera);
}

// ─── MUSIC ───
function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

    function playNote() {
      if (!audioCtx || audioCtx.state === 'closed') return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
      filter.type = 'lowpass';
      filter.frequency.value = 800 + Math.random() * 400;
      const vol = 0.04 + Math.random() * 0.03;
      const dur = 1.5 + Math.random() * 2;
      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + dur);
      setTimeout(playNote, 800 + Math.random() * 1500);
    }

    // Drone pad
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const padGain = audioCtx.createGain();
    const padFilter = audioCtx.createBiquadFilter();
    osc1.type = 'sine'; osc1.frequency.value = 130.81;
    osc2.type = 'sine'; osc2.frequency.value = 196.00;
    padFilter.type = 'lowpass'; padFilter.frequency.value = 400;
    padGain.gain.value = 0.025;
    osc1.connect(padFilter); osc2.connect(padFilter);
    padFilter.connect(padGain); padGain.connect(audioCtx.destination);
    osc1.start(); osc2.start();

    playNote();
  } catch(e) { console.log('Audio not supported'); }
}

// ─── CAMERA & AR START ───
async function startCamera() {
  loadingOverlay.classList.add('show');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    cameraFeed.srcObject = stream;
    await cameraFeed.play();

    loadingOverlay.classList.remove('show');
    landing.classList.add('hide');
    arView.classList.add('active');

    initThree();
    animate();
    startMusic();

    // Touch events
    threeCanvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (let t of e.changedTouches) {
        spawnFlower(t.clientX, t.clientY);
      }
      if (flowerCount === e.changedTouches.length) touchHint.classList.add('hidden');
    }, { passive: false });

    threeCanvas.addEventListener('click', (e) => {
      spawnFlower(e.clientX, e.clientY);
      if (flowerCount === 1) touchHint.classList.add('hidden');
    });

  } catch(err) {
    console.error(err);
    loadingOverlay.classList.remove('show');
    permModal.classList.remove('show');
    errorScreen.classList.add('show');
  }
}

// ─── CLOSE AR ───
function closeARView() {
  if (cameraFeed.srcObject) {
    cameraFeed.srcObject.getTracks().forEach(t => t.stop());
  }
  if (audioCtx) { audioCtx.close(); musicStarted = false; }

  // Cleanup Three.js
  flowerGroups.forEach(f => {
    f.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
    scene.remove(f);
  });
  particleSystems.forEach(ps => {
    ps.geometry.dispose(); ps.material.dispose(); scene.remove(ps);
  });
  flowerGroups = [];
  particleSystems = [];
  flowerCount = 0;
  flowerCountEl.textContent = '🌸 0';

  if (renderer) { renderer.dispose(); renderer = null; }
  scene = null; camera = null;

  arView.classList.remove('active');
  landing.classList.remove('hide');
  touchHint.classList.remove('hidden');
}

// ─── EVENTS ───
document.getElementById('startBtn').addEventListener('click', () => {
  permModal.classList.add('show');
});
document.getElementById('cancelPerm').addEventListener('click', () => {
  permModal.classList.remove('show');
});
document.getElementById('confirmPerm').addEventListener('click', () => {
  permModal.classList.remove('show');
  startCamera();
});
document.getElementById('closeAR').addEventListener('click', closeARView);

window.addEventListener('resize', () => {
  if (camera && renderer) {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
});
