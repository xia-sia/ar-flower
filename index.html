<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>오월의 부귀화가 핀다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1a1a;
    --cream: #f5f0e8;
    --gold: #b8915a;
    --deep-blue: #1e3a5f;
    --peony-pink: #d4899b;
    --leaf-green: #5a7247;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ─── LANDING PAGE ─── */
  #landing {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: var(--cream);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #landing.hide {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }

  /* background pattern */
  #landing::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(184,145,90,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(212,137,155,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  /* decorative top line */
  .top-deco {
    width: 1px; height: 60px;
    background: var(--gold);
    margin-bottom: 24px;
    animation: growDown 1.2s ease forwards;
    transform-origin: top;
  }
  @keyframes growDown {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }

  .subtitle-top {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1s 0.4s ease forwards;
  }

  .main-title {
    font-weight: 900;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1.5;
    text-align: center;
    color: var(--ink);
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 1s 0.6s ease forwards;
  }
  .main-title .accent {
    color: var(--peony-pink);
  }

  /* artist photo */
  .artist-wrap {
    display: flex; flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s 0.8s ease forwards;
  }
  .artist-photo {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gold);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }
  .artist-name {
    margin-top: 14px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--ink);
  }

  /* CTA button */
  .cta-btn {
    position: relative;
    display: flex; align-items: center; gap: 10px;
    padding: 16px 36px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 1s 1s ease forwards;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
  }
  .cta-btn:active {
    transform: scale(0.96);
  }
  .cta-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--peony-pink));
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 50px;
    z-index: -1;
  }
  .cta-btn:hover::after { opacity: 1; }
  .cta-btn svg { width: 18px; height: 18px; }

  .bottom-deco {
    position: absolute;
    bottom: 40px;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(0,0,0,0.25);
    opacity: 0;
    animation: fadeUp 1s 1.2s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── PERMISSION MODAL ─── */
  #permModal {
    display: none;
    position: fixed; inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  #permModal.show { display: flex; }

  .modal-card {
    background: var(--cream);
    border-radius: 20px;
    padding: 36px 28px;
    width: min(88vw, 340px);
    text-align: center;
    animation: modalIn 0.4s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-icon {
    width: 56px; height: 56px;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--peony-pink), var(--gold));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-icon svg { width: 28px; height: 28px; fill: white; }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .modal-desc {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(0,0,0,0.55);
    margin-bottom: 24px;
  }
  .modal-btns {
    display: flex; gap: 10px;
  }
  .modal-btns button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  .modal-btns button:active { transform: scale(0.96); }
  .btn-cancel {
    background: rgba(0,0,0,0.06);
    color: var(--ink);
  }
  .btn-confirm {
    background: var(--ink);
    color: var(--cream);
  }

  /* ─── AR VIEW ─── */
  #arView {
    position: fixed; inset: 0;
    display: none;
    z-index: 50;
    background: #000;
  }
  #arView.active { display: block; }

  #cameraFeed {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  #arCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 51;
    pointer-events: auto;
  }

  /* hint overlay */
  #touchHint {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
    animation: hintPulse 2.5s ease infinite;
    transition: opacity 0.6s ease;
  }
  #touchHint.hidden { opacity: 0; }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.03); }
  }

  /* close button */
  #closeAR {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    left: 16px;
    margin-top: 16px;
    z-index: 60;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: none;
    color: white;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* flower counter */
  #flowerCount {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    right: 16px;
    margin-top: 16px;
    z-index: 60;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* error state */
  #errorScreen {
    display: none;
    position: fixed; inset: 0;
    z-index: 300;
    background: var(--cream);
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px;
    text-align: center;
  }
  #errorScreen.show { display: flex; }
  #errorScreen h2 { font-size: 20px; margin-bottom: 12px; }
  #errorScreen p { font-size: 14px; color: rgba(0,0,0,0.5); line-height: 1.6; }
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing">
  <div class="top-deco"></div>
  <div class="subtitle-top">AR EXPERIENCE</div>
  <h1 class="main-title">오월의<br><span class="accent">부귀화</span>가 핀다</h1>
  <div class="artist-wrap">
    <img class="artist-photo" id="artistImg" alt="김시아 작가">
    <div class="artist-name">김시아 작가</div>
  </div>
  <button class="cta-btn" id="startBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    AR 체험하기
  </button>
  <div class="bottom-deco">TOUCH TO BLOOM</div>
</div>

<!-- PERMISSION MODAL -->
<div id="permModal">
  <div class="modal-card">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div class="modal-title">카메라 사용 허가</div>
    <div class="modal-desc">
      AR 체험을 위해 카메라 접근 권한이 필요합니다.<br>
      촬영된 영상은 저장되지 않습니다.
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelPerm">취소</button>
      <button class="btn-confirm" id="confirmPerm">허용하기</button>
    </div>
  </div>
</div>

<!-- AR VIEW -->
<div id="arView">
  <video id="cameraFeed" autoplay playsinline muted></video>
  <canvas id="arCanvas"></canvas>
  <button id="closeAR">✕</button>
  <div id="flowerCount">🌸 0</div>
  <div id="touchHint">화면을 터치하면 꽃이 피어납니다</div>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <h2>카메라를 열 수 없습니다</h2>
  <p>브라우저 설정에서 카메라 권한을 허용해 주세요.</p>
</div>

// ─── ELEMENTS ───
const landing = document.getElementById('landing');
const startBtn = document.getElementById('startBtn');
const permModal = document.getElementById('permModal');
const cancelPerm = document.getElementById('cancelPerm');
const confirmPerm = document.getElementById('confirmPerm');
const arView = document.getElementById('arView');
const cameraFeed = document.getElementById('cameraFeed');
const arCanvas = document.getElementById('arCanvas');
const closeAR = document.getElementById('closeAR');
const touchHint = document.getElementById('touchHint');
const flowerCountEl = document.getElementById('flowerCount');
const errorScreen = document.getElementById('errorScreen');
const artistImg = document.getElementById('artistImg');

// Set artist image
artistImg.src = ARTIST_SRC;

// ─── STATE ───
let flowers = [];
let flowerCount = 0;
let ctx;
let peonyImg = new Image();
let animFrame;
let audioCtx;
let musicStarted = false;

peonyImg.src = PEONY_SRC;

// ─── MUSIC (procedural ambient) ───
function startMusic() {
  if (musicStarted) return;
  musicStarted = true;

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Pentatonic scale - Korean feel
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

    function playNote() {
      if (!audioCtx || audioCtx.state === 'closed') return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = 'sine';
      osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];

      filter.type = 'lowpass';
      filter.frequency.value = 800 + Math.random() * 400;

      const vol = 0.04 + Math.random() * 0.03;
      const dur = 1.5 + Math.random() * 2;
      const now = audioCtx.currentTime;

      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + dur);

      setTimeout(playNote, (800 + Math.random() * 1500));
    }

    // Drone pad
    function createPad() {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc1.type = 'sine';
      osc1.frequency.value = 130.81;
      osc2.type = 'sine';
      osc2.frequency.value = 196.00;

      filter.type = 'lowpass';
      filter.frequency.value = 400;

      gain.gain.value = 0.025;

      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start();
      osc2.start();
    }

    createPad();
    playNote();

  } catch(e) {
    console.log('Audio not supported');
  }
}

// ─── FLOWER CLASS ───
class Flower {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.scale = 0;
    this.targetScale = 0.3 + Math.random() * 0.4;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.005;
    this.opacity = 0;
    this.born = Date.now();
    this.size = 120 + Math.random() * 80;
    // Gentle floating
    this.floatOffset = Math.random() * Math.PI * 2;
    this.floatAmp = 1 + Math.random() * 2;
  }

  update() {
    const age = (Date.now() - this.born) / 1000;
    // Bloom in
    const bloomDuration = 1.2;
    if (age < bloomDuration) {
      const t = age / bloomDuration;
      const ease = 1 - Math.pow(1 - t, 3); // ease out cubic
      this.scale = this.targetScale * ease;
      this.opacity = Math.min(1, t * 2);
    } else {
      this.scale = this.targetScale;
      this.opacity = 1;
    }
    this.rotation += this.rotSpeed;

    // Gentle float
    const floatY = Math.sin(Date.now() / 1500 + this.floatOffset) * this.floatAmp;
    this.drawY = this.y + floatY;
  }

  draw(ctx) {
    if (!peonyImg.complete) return;
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(this.x, this.drawY || this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);
    const s = this.size;
    ctx.drawImage(peonyImg, -s/2, -s/2, s, s);
    ctx.restore();
  }
}

// ─── PARTICLE BURST ───
let particles = [];
class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.01 + Math.random() * 0.02;
    this.size = 2 + Math.random() * 4;
    this.color = ['#d4899b','#b8915a','#f5e6d0','#ffffff','#e8b4c0'][Math.floor(Math.random()*5)];
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.03;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── AR LOOP ───
function resizeCanvas() {
  arCanvas.width = window.innerWidth;
  arCanvas.height = window.innerHeight;
}

function arLoop() {
  if (!ctx) return;
  ctx.clearRect(0, 0, arCanvas.width, arCanvas.height);

  // Update & draw flowers
  flowers.forEach(f => { f.update(); f.draw(ctx); });

  // Update & draw particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(ctx); });

  animFrame = requestAnimationFrame(arLoop);
}

// ─── TOUCH HANDLER ───
function onTouch(e) {
  e.preventDefault();
  const touches = e.changedTouches || [{ clientX: e.clientX, clientY: e.clientY }];

  for (let t of touches) {
    const x = t.clientX;
    const y = t.clientY;

    flowers.push(new Flower(x, y));
    flowerCount++;
    flowerCountEl.textContent = '🌸 ' + flowerCount;

    // Burst particles
    for (let i = 0; i < 15; i++) {
      particles.push(new Particle(x, y));
    }
  }

  // Hide hint after first touch
  if (flowerCount === 1) {
    touchHint.classList.add('hidden');
  }
}

// ─── CAMERA START ───
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    cameraFeed.srcObject = stream;
    await cameraFeed.play();

    // Show AR view
    landing.classList.add('hide');
    arView.classList.add('active');

    // Setup canvas
    resizeCanvas();
    ctx = arCanvas.getContext('2d');

    // Start AR loop
    arLoop();

    // Start music
    startMusic();

    // Touch events
    arCanvas.addEventListener('touchstart', onTouch, { passive: false });
    arCanvas.addEventListener('click', onTouch);

  } catch(err) {
    console.error(err);
    permModal.classList.remove('show');
    errorScreen.classList.add('show');
  }
}

// ─── EVENT BINDINGS ───
startBtn.addEventListener('click', () => {
  permModal.classList.add('show');
});

cancelPerm.addEventListener('click', () => {
  permModal.classList.remove('show');
});

confirmPerm.addEventListener('click', () => {
  permModal.classList.remove('show');
  startCamera();
});

closeAR.addEventListener('click', () => {
  // Stop camera
  if (cameraFeed.srcObject) {
    cameraFeed.srcObject.getTracks().forEach(t => t.stop());
  }
  // Stop animation
  cancelAnimationFrame(animFrame);
  // Stop audio
  if (audioCtx) {
    audioCtx.close();
    musicStarted = false;
  }
  // Reset
  arView.classList.remove('active');
  landing.classList.remove('hide');
  flowers = [];
  particles = [];
  flowerCount = 0;
  flowerCountEl.textContent = '🌸 0';
  touchHint.classList.remove('hidden');
  ctx = null;
});

window.addEventListener('resize', () => {
  if (ctx) resizeCanvas();
});
</script>
